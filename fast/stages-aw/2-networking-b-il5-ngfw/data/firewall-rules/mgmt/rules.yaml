# skip boilerplate check
---
# Terraform will be unable to decode this file if it does not contain valid YAML
# You can retain `---` (start of the document) to indicate an empty document.

ingress:
  allow-hc-nva-ssh-mgmt:
    description: "Allow traffic from Google healthchecks to NVA appliances"
    source_ranges:
      - healthchecks
      - iap
    rules:
      - protocol: tcp
        ports:
          - 22
  allow-ssh-bastion-nva-mgmt:
    description: "We expect the bastion host to be able to SSH into the NGFWs"
    sources:
      - bastion
    source_ranges:
      - internal
    targets:
      - nva
    rules:
      - protocol: tcp
        ports:
          - 22
          - 443