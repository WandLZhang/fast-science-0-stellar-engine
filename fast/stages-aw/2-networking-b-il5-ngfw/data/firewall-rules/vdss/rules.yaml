# skip boilerplate check
---
# Terraform will be unable to decode this file if it does not contain valid YAML
# You can retain `---` (start of the document) to indicate an empty document.

ingress:
  allow-iap-ssh-landing:
    description: "Allow traffic from Google IAP over SSH"
    source_ranges:
      - iap
    rules:
      - protocol: tcp
        ports:
          - 22
  allow-hc-nva-ssh-landing:
      description: "Allow traffic from Google healthchecks to NVA appliances"
      source_ranges:
        - healthchecks
      rules:
        - protocol: tcp
          ports:
            - 22
  allow-traffic-internal:
    description: "Allow traffic from inside the the networks"
    targets: ["nva"]
    source_ranges:
      - 10.0.0.0/8
