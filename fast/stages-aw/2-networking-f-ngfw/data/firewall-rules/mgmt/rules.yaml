ingress:
  allow-hc-nva-ssh-mgmt:
    description: "Allow traffic from Google healthchecks to NVA appliances"
    source_ranges:
      - healthchecks
      - 35.235.240.0/20 # IAP
      - 64.124.122.214/32 # Dark Wolf
    rules:
      - protocol: tcp
        ports:
          - 22
