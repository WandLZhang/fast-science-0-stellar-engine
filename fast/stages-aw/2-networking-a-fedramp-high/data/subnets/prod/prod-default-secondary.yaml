# Workload subnet in the secondary region
# Provides capacity overflow and regional availability for research workloads.
# The secondary region is set in terraform.tfvars: regions = { secondary = "..." }
---
name: default-secondary-region
region: secondary
ip_cidr_range: 10.203.0.0/16
description: Default subnet for prod environment in secondary region
flow_logs_config:
  aggregation_interval: "INTERVAL_5_SEC"
  flow_sampling: 1
