# This prevents users from creating firewall rules that allow traffic from 0.0.0.0/0
# Rules must explicitly allow smaller subnets, or preferably tags
# COULD HAVE

custom.restrictFirewallRanges:
  name: Restrict Firewall rules using the source-range 0.0.0.0/0
  display_name: Restrict Firewall rules using the source-range 0.0.0.0/0
  action_type: DENY
  resource_types:
    - compute.googleapis.com/Firewall
  method_types:
    - CREATE
    - UPDATE
  condition: "resource.direction.matches('INGRESS') && resource.sourceRanges.all(range, range == '0.0.0.0/0') && resource.allowed.exists(entry, entry != null)"
  description: Firewall rules must be more specific than 0.0.0.0/0.
