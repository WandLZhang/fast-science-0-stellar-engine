workflow:
  rules:
    - when: never # This rule will always prevent the pipeline from running until we have a properly configured and registered runner instance.

# This job will never actually run because of the 'workflow: rules: when: never'
dummy_job:
  stage: .pre
  script:
    - echo "This is a dummy job to satisfy GitLab CI's job requirement."
    - echo "The pipeline is disabled by 'workflow:rules:when:never'."

