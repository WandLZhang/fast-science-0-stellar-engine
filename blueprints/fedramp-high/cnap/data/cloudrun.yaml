easy:
  cloud_run_image: "us-docker.pkg.dev/cloudrun/container/hello"
  members:
    - group:easy@${DOMAIN}
  subdomain: easy
  condition:
    title: Lenient Device Level
    description: "Group based + US"
    expression: "\"accessPolicies/${ACCESSPOLICY}/accessLevels/lenient_device\" in request.auth.access_levels"
mod:
  cloud_run_image: "us-docker.pkg.dev/cloudrun/container/hello"
  members:
    - group:medium@${DOMAIN}
  subdomain: mod
  condition:
    title: Moderate Device Level
    description: "Group based + Expiring Access by 2025 + 7ET->21ET Monday through Friday + US"
    expression: "\"accessPolicies/${ACCESSPOLICY}/accessLevels/moderate_device\" in request.auth.access_levels"
hard:
  cloud_run_image: "us-docker.pkg.dev/cloudrun/container/hello"
  members:
    - group:hard@${DOMAIN}
  subdomain: hard
  condition:
    title: Strict Device Level
    description: "Group based + MacOS/Windows + Encryption Enabled + Corp Owned + Expiring Access by 2025 + 7ET->21ET Monday through Friday + US"
    expression: "\"accessPolicies/${ACCESSPOLICY}/accessLevels/strict_device\" in request.auth.access_levels"
