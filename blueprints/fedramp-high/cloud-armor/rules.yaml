policy-one:
  description: This is a policy.
  #region: 
  #project: 
  default_action: allow
  default_versioned_expr: SRC_IPS_V1
  default_src_ip_ranges:
  - 10.0.0.0/8
  rules:
  - description: Example rule.
    priority: 100
    #versioned_expr: SRC_IPS_V1
    #src_ip_ranges:
      # 10.0.0.0/8
    #or
    #expression: xss-stable
    #can only choose versioned_expr + ip_ranges or expression, not both
    #don't need to set them in this rule because of default values in this policy
  - description: Rule with WAF
    priority: 101
    expression: xss-stable
    preconfigured_waf_config:
    - exclusion:
      # request_header: 
        # operator:
        # value:
      # request_cookie: 
        # operator:
        # value:
      - request_uri:
        - operator: STARTS_WITH
          value: /admin
        target_rule_set: rce-stable
      - request_query_param:
        - operator: CONTAINS
          value: password
        - operator: STARTS_WITH
          value: freeform
        - operator: EQUALS
          value: description
        target_rule_set: xss-stable
        target_rule_ids:
        - owasp-crs-v030001-id941330-xss
        - owasp-crs-v030001-id941340-xss
    action: deny(403)
    #preview: true 
policy-two:
  region: us-east1
  description: This is another policy.
  default_src_ip_ranges:
  - 10.0.0.0/8
  rules:
  - description: Example with rate limits.
    priority: 90
    versioned_expr: SRC_IPS_V1
    src_ip_ranges:
    - 10.0.0.0/16
    rate_limit_options:
      rate_limit_threshold:
        count: 40
        interval_sec: 10
      conform_action: allow
      exceed_action: deny(429)
      #enforce_on_key_configs:
        #enforce_on_key_type: Possible values are ALL, IP, HTTP_HEADER, XFF_IP, HTTP_COOKIE, HTTP_PATH, SNI, REGION_CODE, TLS_JA3_FINGERPRINT, USER_IP
        #enforce_on_key_name: Only applicable for key type: HTTP_HEADER, HTTP_COOKIE
      #ban_threshold: 
        #count: 
        #interval_sec:
      #ban_duration_sec: 
    action: throttle