# This file defines the native '/refactor' command.
# It launches the background agent defined in the 'code_refactor.md' prompt.

[command]
name = "refactor"
description = "Launches a background agent to refactor code based on a user prompt."

# The 'exec' field is the native way to run a shell command from a custom command.
# This is how we trigger the Gemini CLI's background mode for our agent.
exec = """
sh -c '
  # Check if the user provided a prompt for the agent.
  if [ -z "$1" ]; then
    echo "Usage: /refactor \"Your detailed refactoring request\""
    exit 1
  fi

  # Define paths and create a timestamped log file.
  PROMPT_FILE="agentic-workflow/agents/background/prompts/code_refactor.md"
  REPORTS_DIR="agentic-workflow/agents/background/reports"
  LOG_FILE="${REPORTS_DIR}/refactor_$(date +%Y%m%d-%H%M%S).log"

  # Ensure the reports directory exists.
  mkdir -p "$REPORTS_DIR"

  echo "Launching background agent. Log file: ${LOG_FILE}"

  # This is the core command that runs the agent in the background.
  gemini -p "${PROMPT_FILE}" \
    --prompt-var USER_PROMPT="$1" \
    --background \
    --log-file "${LOG_FILE}"
' _ "$@"
"""