# This file defines the '/review' command for the Gemini CLI.
# It displays the content of an agent log file in a readable format.

[command]
name = "review"
description = "Displays an agent log file, rendering Markdown for readability."

exec = """
sh -c '
  LOG_FILE="$1"

  # If no file is provided, show the 5 most recent logs.
  if [ -z "$LOG_FILE" ]; then
    echo "Usage: /review <PATH_TO_LOG_FILE>"
    echo "\nMost recent logs:"
    ls -1t agentic-workflow/agents/background/reports | head -n 5
    exit 0
  fi

  # Check if the specified log file exists.
  if [ ! -f "$LOG_FILE" ]; then
    echo "Error: Log file not found at ''${LOG_FILE}''"
    exit 1
  fi

  echo "--- Reviewing Log: ${LOG_FILE} ---"

  # Use ''glow'' for beautiful Markdown rendering if it''s installed.
  if command -v glow >/dev/null 2>&1; then
    glow "$LOG_FILE"
  else
    # Otherwise, fall back to ''cat'' and suggest installing glow.
    cat "$LOG_FILE"
    echo "\n--- End of Log ---"
    echo "(Tip: For a nicer view, install ''glow'': https://github.com/charmbracelet/glow)"
  fi
' _ "$@"
"""
