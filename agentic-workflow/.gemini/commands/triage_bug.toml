# Defines the /triage_bug command.
# Launches an agent to analyze a Buganizer ticket and create a plan.

[command]
name = "triage_bug"
description = "Launches a background agent to triage a Buganizer ticket."

exec = """
sh -c '
  if [ -z "$1" ]; then
    echo "Usage: /triage_bug <ISSUE_ID>"
    exit 1
  fi

  PROMPT_FILE="agentic-workflow/agents/background/prompts/bug_triage.md"
  REPORTS_DIR="agentic-workflow/agents/background/reports"
  LOG_FILE="${REPORTS_DIR}/bug_triage_$(date +%Y%m%d-%H%M%S).log"
  mkdir -p "$REPORTS_DIR"

  echo "Launching bug_triage agent for issue $1. Log file: ${LOG_FILE}"

  gemini -p "${PROMPT_FILE}" \
    --prompt-var BUG_ID="$1" \
    --background \
    --log-file "${LOG_FILE}"
'
"""
