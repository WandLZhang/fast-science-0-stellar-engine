# Defines the /implement_plan command.
# Launches an agent to write Terraform code based on a triage report log file.

[command]
name = "implement_plan"
description = "Launches a Terraform agent to implement a plan from a log file."

exec = """
sh -c '
  if [ -z "$1" ]; then
    echo "Usage: /implement_plan <PATH_TO_TRIAGE_LOG_FILE>"
    exit 1
  fi

  PLAN_FILE_PATH="$1"
  PROMPT_FILE="agentic-workflow/agents/background/prompts/terraform_updater.md"
  REPORTS_DIR="agentic-workflow/agents/background/reports"
  LOG_FILE="${REPORTS_DIR}/terraform_updater_$(date +%Y%m%d-%H%M%S).log"
  mkdir -p "$REPORTS_DIR"

  echo "Launching terraform_updater agent with plan ${PLAN_FILE_PATH}. Log file: ${LOG_FILE}"

  # Here, we pass the log file path into the prompt variable "PLAN_FILE_PATH".
  # The agent''s prompt will then inject the content of that file.
  gemini -p "${PROMPT_FILE}" \
    --prompt-var PLAN_FILE_PATH="${PLAN_FILE_PATH}" \
    --background \
    --log-file "${LOG_FILE}"
' _ "$@"
"""
